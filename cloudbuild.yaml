#
# Cloud Build config for kin-db repo.
#
# On every push: run tests
# Tagged GitHub releases publish kin-model and kin-db crates to KinLab registry

steps:
  # Run tests
  - name: 'rust:slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        apt-get update && apt-get install -y pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*
        HF_HUB_OFFLINE=1 cargo test --workspace -- \
          --skip process_embedding_queue_without_embeddings_is_noop \
          --skip default_dimensions_match_default_model \
          --skip test_vector_index_dimension_mismatch_auto_recovery \
          --skip many_vectors_search_quality
    id: 'test'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1800s'
