name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  dco:
    name: DCO Sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check DCO sign-off
        uses: christophebedard/dco-check@v1.2.0

  check:
    name: Check & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build
        run: cargo build --all-targets

      - name: Test
        run: cargo test

  # Security audit moved to sast.yml (cargo-deny: advisories + licenses + bans + sources)

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-tarpaulin-

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage
        run: |
          if ! cargo tarpaulin --out xml --out stdout; then
            echo "::warning::Tarpaulin is currently non-blocking in CI for the public alpha."
          fi

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: cobertura.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: firelock-ai/kin-db
          fail_ci_if_error: false

  notify-downstream:
    name: Notify Downstream Repos
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check]
    runs-on: ubuntu-latest
    steps:
      - name: Trigger kin CI
        uses: peter-evans/repository-dispatch@v3
        with:
          # Requires a PAT with repo scope stored as DISPATCH_TOKEN secret.
          # Create at: GitHub > Settings > Developer settings > Personal access tokens
          # Then add to: kin-db repo > Settings > Secrets > Actions > DISPATCH_TOKEN
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: firelock-ai/kin
          event-type: dependency-updated
          client-payload: '{"source": "kin-db", "sha": "${{ github.sha }}"}'
