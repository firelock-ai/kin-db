name: Registry Publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  release:
    uses: firelock-ai/kin-actions/.github/workflows/cargo-registry-release.yml@v0.1.7
    with:
      # Pin the kin-actions scripts to the same tag as the reusable workflow
      # referenced above. The workflow's own default for this input is an older
      # tag whose check-version-bump.py predates the --labels argument that the
      # v0.1.7 workflow passes, so leaving it unset fails the version-bump gate
      # ("unrecognized arguments: --labels"). Keep the two refs in lockstep.
      kin-actions-ref: v0.1.7
      package: kin-db
      manifest: Cargo.toml
      source-paths: crates/kin-db Cargo.toml
      registry-build-command: cargo build && cargo build --no-default-features --features vector
      test-command: >-
        HF_HUB_OFFLINE=1 cargo test -p kin-db --lib --
        --skip process_embedding_queue_without_embeddings_is_noop
        --skip default_dimensions_match_default_model
        --skip test_vector_index_dimension_mismatch_auto_recovery
        --skip many_vectors_search_quality
    secrets:
      KINLAB_CARGO_TOKEN: ${{ secrets.KINLAB_CARGO_TOKEN }}
      KIN_CI_BOT_TOKEN: ${{ secrets.KIN_CI_BOT_TOKEN }}
      KIN_DOWNSTREAM_DISPATCH_TOKEN: ${{ secrets.KIN_DOWNSTREAM_DISPATCH_TOKEN }}
