name: Kin Dependency Wave

on:
  repository_dispatch:
    types: [kin-registry-release]
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

jobs:
  dependency-wave:
    uses: firelock-ai/kin-actions/.github/workflows/cargo-dependency-wave.yml@v0.1.4
    with:
      manifests: crates/kin-db/Cargo.toml
      test-command: cargo test -p kin-db --lib
    secrets:
      KIN_CI_BOT_TOKEN: ${{ secrets.KIN_CI_BOT_TOKEN }}
