#
# cargo-deny configuration for the kin-db workspace.
# Checks: advisories, licenses, bans, sources.
# Run locally: cargo deny check

[graph]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# --- Advisory database (replaces standalone cargo-audit) ---
[advisories]
# Unmaintained (NOT vulnerabilities) — transitive, no safe upgrade, no runtime
# risk. Each has a reason per policy.
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "bincode 1.3.3 — author ceased development; 1.3.3 is a complete, stable release. Transitive; no vuln, no fix needed." },
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 unmaintained — transitive proc-macro, build-time only; no vuln, no drop-in std replacement adopted yet." },
    { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile 1.x unmaintained — functionality folded into rustls-pki-types; transitive, no vuln, no action needed until the dep tree drops it." },
    # Real DoS advisories, patched upstream in quick-xml >= 0.41.0 but transitively
    # capped below the fix: object_store 0.14 (latest) requires quick-xml ^0.40.1
    # (< 0.41) and no object_store release yet moves to 0.41. quick-xml is reachable
    # only via the optional `gcs` cloud-storage path parsing GCS API responses, not
    # general user input. Time-boxed: remove when object_store requires quick-xml >= 0.41.
    { id = "RUSTSEC-2026-0194", reason = "quick-xml DoS (quadratic attribute-duplicate check); patched >= 0.41.0 but object_store 0.14 caps at ^0.40.1; reachable only via the optional gcs path parsing GCS API responses; remove when object_store requires quick-xml >= 0.41." },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml DoS (unbounded namespace-declaration allocation in NsReader); patched >= 0.41.0 but object_store 0.14 caps at ^0.40.1; reachable only via the optional gcs path parsing GCS API responses; remove when object_store requires quick-xml >= 0.41." },
]

# --- License policy ---
[licenses]
# kin-db is Apache-2.0. All transitive dependencies must use compatible licenses.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    # CDLA-Permissive-2.0: Community Data License Agreement, Permissive v2.0 — a
    # permissive (non-copyleft) license on a transitive data/asset crate. Safe to
    # allow; flagged for review as a non-code license entering the graph.
    "CDLA-Permissive-2.0",
    "ISC",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

# --- Crate bans ---
[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# --- Source provenance ---
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = ["firelock-ai"]
